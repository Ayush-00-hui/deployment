services:
  mongodb:
    image: mongo:6.0
    container_name: payment-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - payment-network
    restart: always

  app:
    build: .
    container_name: payment-app
    ports:
      - "80:8080"  # Expose on standard HTTP port 80 externally
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/paymentdb
    networks:
      - payment-network
    restart: on-failure

  sonarqube:
    image: sonarqube:lts-community
    container_name: payment-sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonar-data:/opt/sonarqube/data
      - sonar-logs:/opt/sonarqube/logs
      - sonar-extensions:/opt/sonarqube/extensions
    networks:
      - payment-network
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local
  sonar-data:
    driver: local
  sonar-logs:
    driver: local
  sonar-extensions:
    driver: local

networks:
  payment-network:
    driver: bridge
