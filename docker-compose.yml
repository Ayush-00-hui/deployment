version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: payment-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - payment-network
    restart: always

  app:
    build: .
    container_name: payment-app
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/paymentdb
    networks:
      - payment-network
    restart: on-failure

volumes:
  mongo-data:
    driver: local

networks:
  payment-network:
    driver: bridge
